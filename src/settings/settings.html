<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <h1>🐱 Cat Gatekeeper</h1>

  <div class="field">
    <label>
      Работать до перерыва
      <span id="work-val">25 мин</span>
    </label>
    <input type="range" id="work-slider" min="1" max="120" step="1" value="25">
  </div>

  <div class="field">
    <label>
      Длина перерыва
      <span id="break-val">20 сек</span>
    </label>
    <input type="range" id="break-slider" min="5" max="300" step="5" value="20">
  </div>

  <hr class="separator">

  <div class="field">
    <label>
      Фильтр по приложениям
      <span class="future-badge">скоро</span>
    </label>
    <div class="process-placeholder">
      Таймер сейчас глобальный.<br>
      В следующей версии можно будет указать<br>
      список приложений-триггеров.
    </div>
  </div>

  <div class="btn-row">
    <button id="btn-test">🐾 Показать кота</button>
    <button id="btn-save">💾 Сохранить</button>
  </div>

  <div id="saved-msg">✅ Сохранено! Таймер сброшен.</div>

  <script src="settings.js"></script>
</body>
</html>
